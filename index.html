<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Follow Alert</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #alert-container {
            text-align: center;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
        }
        #follower-name {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #rank-image {
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <div id="alert-container">
        <span id="follower-name">Thank you, [Name]!</span>
        <br>
        <img id="rank-image" src="" alt="Rank Image">
    </div>
    <script>
        // Example ranks - add your image URLs here
        const ranks = [
            'https://i.pinimg.com/1200x/c6/18/61/c6186141f91dee162e4702d8e34766e0.jpg',
            'https://i.pinimg.com/736x/82/46/71/824671ffe2b3829934c00f89b2bd1b74.jpg',
            'https://i.pinimg.com/736x/8e/17/d6/8e17d6cca2e0714d975a3f59eb555eac.jpg',
            'https://i.pinimg.com/736x/7f/68/a0/7f68a0b9a372c40e06e41d67052f9e35.jpg',
            'https://i.pinimg.com/736x/cb/61/12/cb6112bde4326d6644caca184137915c.jpg',
            'https://i.pinimg.com/1200x/05/cf/1b/05cf1b51374fa6b376aea8eda85623d1.jpg',
            'https://i.pinimg.com/1200x/67/f7/e1/67f7e1cd2494dd71bc9fb887b25a55ca.jpg'
        ];

        // Simulate a follow (in a real case, you'd get this from TikTok API or a webhook)
        function simulateFollow(name) {
            document.getElementById('follower-name').innerText = `Thank you, ${name}!`;
            const randomRank = ranks[Math.floor(Math.random() * ranks.length)];
            document.getElementById('rank-image').src = randomRank;
        }

        // For testing: simulate a follow after 2 seconds
        setTimeout(() => {
            simulateFollow('PlayerOne');
        }, 2000);
    </script>
</body>
</html>
